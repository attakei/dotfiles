pre-commit:
  parallel: true
  jobs:
    - name: Lua
      glob: "*.lua"
      group:
        piped: true
        jobs:
          - name: Stylua
            run: stylua {staged_files}
            stage_fiexed: true
          - name: Selene
            run: selene {staged_files}
            stage_fiexed: true
