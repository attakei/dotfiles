pre-commit:
  parallel: true
  jobs:
    - name: Lua
      glob: "*.lua"
      exclude:
        - 'root/.config/nvim/*'  # Old NeoVim settings is based on AstroNvim, and I will remove after worked nvim-2026
        - 'root/.config/wezterm/*'  # TODO: Fix them after merged into 'main' branch.
      group:
        piped: true
        jobs:
          - name: Stylua
            run: stylua {staged_files}
            stage_fiexed: true
          - name: Selene
            run: selene {staged_files}
            stage_fiexed: true
